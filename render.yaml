services:
  - type: web
    name: varutri-honeypot
    env: docker
    plan: free
    branch: azure-backend
    envVars:
      - key: HUGGINGFACE_API_KEY
        sync: false
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DATABASE
        value: varutri_honeypot
      - key: VARUTRI_API_KEY
        sync: false
      - key: WHATSAPP_API_TOKEN
        sync: false
      - key: WHATSAPP_PHONE_NUMBER_ID
        sync: false
      - key: WHATSAPP_VERIFY_TOKEN
        sync: false
