version: '3.8'

services:
  app:
    container_name: varutri_honeypot
    build: .
    ports:
      - "8080:8080"
    environment:
      - MONGODB_URI=${MONGODB_URI}
      - MONGODB_DATABASE=${MONGODB_DATABASE}
      - VARUTRI_API_KEY=${VARUTRI_API_KEY}
      - HUGGINGFACE_API_KEY=${HUGGINGFACE_API_KEY}
      - WHATSAPP_API_TOKEN=${WHATSAPP_API_TOKEN}
      - WHATSAPP_PHONE_NUMBER_ID=${WHATSAPP_PHONE_NUMBER_ID}
      - WHATSAPP_VERIFY_TOKEN=${WHATSAPP_VERIFY_TOKEN}
    restart: unless-stopped
    # If you want to run MongoDB locally as a container, uncomment the 'depends_on' and 'mongodb' service below.
    # However, for AWS Free Tier (EC2 t2.micro/t3.micro), we recommend using MongoDB Atlas (cloud) 
    # to save RAM on the server.
#     depends_on:
#       - mongodb

#   mongodb:
#     image: mongo:latest
#     container_name: mongodb
#     ports:
#       - "27017:27017"
#     volumes:
#       - mongo_data:/data/db
#     restart: unless-stopped

# volumes:
#   mongo_data:
