# ===========================================
# Varutri Honeypot - Application Configuration
# ===========================================
# Sensitive values are loaded from .env file
# See .env.example for required environment variables

# Server Configuration
server.port=8080
server.servlet.context-path=/

# Request Size Limits (prevents DoS attacks)
server.tomcat.max-http-form-post-size=1MB
server.tomcat.max-swallow-size=1MB
spring.servlet.multipart.max-file-size=1MB
spring.servlet.multipart.max-request-size=1MB

# MongoDB Configuration (loaded from .env)
# Fast-fail timeout (3 seconds) to prevent blocking when DB is unavailable
spring.data.mongodb.uri=${MONGODB_URI}
spring.data.mongodb.database=${MONGODB_DATABASE}
# Explicit Host/Port - User Requested Retry
spring.data.mongodb.host=cluster0.qqtqboz.mongodb.net
spring.data.mongodb.port=27017

# Async Request Timeout (2 minutes to handle slow LLM responses)
spring.mvc.async.request-timeout=120000

# LLM Provider Selection (ollama or huggingface)
llm.provider=huggingface

# Security Configuration (loaded from .env)
varutri.api-key=${VARUTRI_API_KEY}

# ===========================================
# Local ML Model Configuration (DJL)
# ===========================================

# Sentence Embedding Model (MiniLM, ~90MB)
local.ml.embedding.model-name=sentence-transformers/all-MiniLM-L6-v2
local.ml.embedding.dimensions=384

# Zero-Shot Classification Model (DeBERTa, ~350MB)
local.ml.zeroshot.model-name=MoritzLaurer/deberta-v3-base-zeroshot-v1
local.ml.zeroshot.max-length=512

# Model cache directory
local.ml.cache-dir=./models-cache

# Enable/disable local ML
local.ml.enabled=true

# Hugging Face Configuration (API key loaded from .env)
huggingface.api-key=${HUGGINGFACE_API_KEY}
huggingface.model=meta-llama/Llama-3.3-70B-Instruct
huggingface.phishing-model=cybersectony/phishing-email-detection-distilbert_v2.1
# Semantic Analysis Models (Phase 3 ML)
huggingface.embedding-model=sentence-transformers/all-MiniLM-L6-v2
huggingface.intent-model=facebook/bart-large-mnli


# Hackathon API Configuration
hackathon.callback-url=${HACKATHON_CALLBACK_URL}
hackathon.team-id=varutri-team

# Conversation Settings
conversation.max-turns=20

# Logging
logging.level.com.varutri.honeypot=DEBUG
logging.level.org.springframework.web=INFO
logging.pattern.console=%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n

# Session Management
varutri.session.max-turns=20
varutri.intelligence.enable-logging=true

# WhatsApp Cloud API Configuration (loaded from .env)
whatsapp.api.token=${WHATSAPP_API_TOKEN}
whatsapp.phone.number.id=${WHATSAPP_PHONE_NUMBER_ID}
whatsapp.verify.token=${WHATSAPP_VERIFY_TOKEN}

# Government Reporting Configuration
government.report.auto-threshold=0.7
government.report.email=report@cybercrime.gov.in

# Rate Limiting Configuration
# Protects API from abuse and DDoS attacks
rate.limit.enabled=true
rate.limit.requests-per-minute=60
rate.limit.burst-capacity=10
# Auto-cleanup: removes inactive buckets to prevent memory leaks
rate.limit.cleanup-interval-ms=3600000
rate.limit.max-idle-minutes=30

# Persona Configuration
# Basic persona identity - can be changed to mimic different user types
# Basic persona identity - Smart Evidence Gathering Persona
varutri.persona.name=Amit Sharma
varutri.persona.age=35
varutri.persona.profession=Junior Accountant
varutri.persona.city=Pune
varutri.persona.country=India
varutri.persona.living-status=You are eager for financial opportunities and easy money. You respond enthusiastically to offers but are careful with personal identity.
varutri.persona.tech-level=You are competent with digital payments. You prefer to initiate transfers yourself rather than clicking links.

# Persona personality traits (pipe-separated)
varutri.persona.personality-traits=Slightly Greedy|Eager to participate|Curious|Polite|Detail-oriented|Guarded about personal info|Insistent on payment details

# Language style instructions (pipe-separated)
varutri.persona.language-style=Professional yet casual|Shows excitement about offers|Uses Hinglish occasionally|Asks direct, clarifying questions|Never reveals you are an AI|Deflects questions about personal life

# Example phrases for the persona (pipe-separated)
varutri.persona.example-phrases=Please share the UPI ID so I can transfer immediately.|Can you give me the exact IFSC code and Account Number?|I am trying to pay but need the correct details.|Is this a verified account?|I have the money ready, just need the details to proceed.|I will send the screenshot once done.

# Common spelling mistakes have been removed to appear clearer
varutri.persona.common-mistakes=

# ===========================================
# Prompt Hardening Configuration (Phase 1)
# ===========================================
# Controls for response quality assurance pipeline

# Enable strict mode (full guardrails in prompts)
prompt.hardening.strict-mode=true

# Include threat context in system prompts for high-risk situations
prompt.hardening.include-threat-context=true

# Maximum retries before using fallback response
prompt.hardening.max-retries=2

# Response generation parameters
prompt.response.max-tokens=200
prompt.response.temperature=0.7

# ===========================================
# Context Window Management (Phase 1.5)
# ===========================================
# Token budget allocation for conversation context

# Maximum total tokens for context (depends on model)
# Llama 3: 8K-128K, GPT-4: 8K-128K
context.max-tokens=4096

# Budget for system prompt (guardrails + persona)
context.system-prompt-budget=1000

# Budget for intelligence summary (UPI, phone, etc.)
context.intelligence-budget=200

# Budget for conversation summary (old messages)
context.summary-budget=400

# Budget for recent messages (full detail)
context.recent-messages-budget=2000

# Reserved for AI response generation
context.response-buffer=300

# Number of recent conversation turns to always keep in full
context.recent-turns-to-keep=6

# ===========================================
# Response Validation Configuration (Phase 3)
# ===========================================
# Critical settings for response quality assurance

# Response length limits (characters)
validation.max-response-length=500
validation.min-response-length=5

# Strict mode: fail on warnings too (not just critical)
validation.strict-mode=true

# Maximum retry attempts before using fallback
validation.max-retries=2

# Log all validation failures for analysis
validation.log-failures=true
